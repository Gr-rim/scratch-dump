<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scratchpad</title>
  <link rel="stylesheet" href="panel.css">
</head>

<body class="theme-dark">

  <!-- CONFIRM DIALOG -->
  <div id="confirmDialog" class="dialog-overlay hidden">
    <div class="dialog-box">
      <div class="dialog-title">Delete Page?</div>
      <div class="dialog-msg" id="confirmMsg">This page will be permanently deleted.</div>
      <div class="dialog-actions">
        <button id="confirmCancel" class="btn-secondary">Cancel</button>
        <button id="confirmOk" class="btn-danger">Delete</button>
      </div>
    </div>
  </div>

  <!-- NAME DIALOG -->
  <div id="nameDialog" class="dialog-overlay hidden">
    <div class="dialog-box">
      <div class="dialog-title">New Scratch Space</div>
      <input id="nameInput" class="name-input" type="text" placeholder="Enter a name..." maxlength="32" />
      <div class="dialog-actions">
        <button id="nameCancel" class="btn-secondary">Cancel</button>
        <button id="nameOk" class="btn-primary">Create</button>
      </div>
    </div>
  </div>

  <!-- SETTINGS PANEL -->
  <div id="settingsPanel" class="settings-panel hidden">
    <div class="settings-header">Settings</div>
    <label class="setting-row">
      <span>Fixed Size</span>
      <input type="checkbox" id="fixedSizeCheck" />
      <span class="toggle-label"></span>
    </label>
    <label class="setting-row">
      <span>Opacity</span>
      <input type="number" id="opacityInput" min="40" max="100" value="100" class="num-input" />
      <span class="unit">%</span>
    </label>
    <label class="setting-row">
      <span>Text Size</span>
      <input type="number" id="textSizeInput" min="8" max="48" value="14" class="num-input" />
      <span class="unit">px</span>
    </label>
    <label class="setting-row">
      <span>Font</span>
      <select id="fontSelect" class="sel-input">
        <option value="Calibri">Calibri</option>
        <option value="Arial">Arial</option>
        <option value="Helvetica">Helvetica</option>
        <option value="Roboto">Roboto</option>
      </select>
    </label>
    <label class="setting-row">
      <span>Theme</span>
      <select id="themeSelect" class="sel-input">
        <option value="dark">Dark</option>
        <option value="light">Light</option>
      </select>
    </label>
    <button id="closeSettings" class="btn-secondary settings-close">Done</button>
  </div>

  <!-- MAIN PANEL -->
  <div id="mainPanel" class="main-panel">

    <!-- TOP BAR -->
    <div class="top-bar">
      <div class="top-left">
        <button class="icon-btn" id="undoBtn" title="Undo">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 14 4 9l5-5" />
            <path d="M4 9h10.5a5.5 5.5 0 0 1 0 11H11" />
          </svg>
        </button>
        <button class="icon-btn" id="redoBtn" title="Redo">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="m15 14 5-5-5-5" />
            <path d="M20 9H9.5a5.5 5.5 0 0 0 0 11H13" />
          </svg>
        </button>
      </div>
      <div class="top-center">
        <span class="site-name" id="siteName">Scratchpad</span>
        <div class="dropdown-wrap" id="folderDropdownWrap">
          <button class="dropdown-chevron" id="folderChevron" title="Switch folder">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
              stroke-linecap="round" stroke-linejoin="round">
              <polyline points="6 9 12 15 18 9" />
            </svg>
          </button>
          <div class="dropdown-menu hidden" id="folderMenu"></div>
        </div>
      </div>
      <div class="top-right">
        <button class="icon-btn" id="copyBtn" title="Copy">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
            stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2" />
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
          </svg>
        </button>
        <button class="icon-btn" id="pasteBtn" title="Paste">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2" />
            <rect x="8" y="2" width="8" height="4" rx="1" ry="1" />
          </svg>
        </button>
        <button class="close-btn" id="closeBtn">Close</button>
      </div>
    </div>

    <!-- EDITOR -->
    <div class="editor-wrap">
      <div id="editor" class="editor" contenteditable="true" spellcheck="true" data-placeholder="Start writing...">
      </div>
    </div>

    <!-- BOTTOM BAR -->
    <div class="bottom-bar">
      <div class="bottom-left">
        <button class="fmt-btn" id="fszDown" title="Decrease font size">A−</button>
        <button class="fmt-btn" id="fszUp" title="Increase font size">A+</button>
        <button class="fmt-btn" id="boldBtn" title="Bold"><b>B</b></button>
        <button class="fmt-btn" id="underlineBtn" title="Underline"><u>U</u></button>
        <button class="fmt-btn" id="italicBtn" title="Italic"><i>I</i></button>
      </div>
      <div class="bottom-center">
        <button class="page-nav-btn hidden" id="prevPageBtn" title="Previous page">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6" />
          </svg>
        </button>
        <span class="page-indicator" id="pageIndicator">Pg. 1</span>
        <button class="page-nav-btn hidden" id="nextPageBtn" title="Next page">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6" />
          </svg>
        </button>
        <button class="add-page-btn" id="addPageBtn" title="Add page">+</button>
      </div>
      <div class="bottom-right">
        <button class="icon-btn" id="settingsBtn" title="Settings">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3" />
            <path
              d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script src="panel.js"></script>
</body>

</html>
